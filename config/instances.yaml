# Coordinators this dashboard can switch between via ?project=<key>.
# Global defaults live in config/settings.yaml. Project-local overrides
# live under each instance's settings: block below.

default: cadencelms
instances:
  cadencelms:
    label: CadenceLMS
    database_url: postgresql://orchestrator:orchestrator@localhost:5432/orchestrator
    roster_file: config/roster.monorepo.yaml
  tendcharting:
    label: TendCharting (EHR)
    database_url: postgresql://orchestrator:orchestrator@localhost:5432/tendcharting
    roster_file: config/roster.tendcharting.yaml
    settings:
      reasoner_base_url: http://10.100.90.132:8083/v1
      reasoner_model: qwen-local
      docs_reasoner_base_url: http://10.100.90.132:8083/v1
      docs_reasoner_model: qwen-local
      promote_repo_path: /home/adam/github/tendcharting-ws/tendcharting
      docs_path: /home/adam/github/tendcharting-ws/tendcharting/docs

  # Add another project by pointing at its own database + roster:
  # acme:
  #   label: Acme LMS
  #   database_url_env: DATABASE_URL_ACME
  #   roster_file: config/roster.acme.yaml
