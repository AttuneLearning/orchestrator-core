# Coordinators this dashboard can switch between via ?project=<key>.
# Global defaults live in config/settings.yaml. Project-local overrides
# live under each instance's settings: block below.

default: cadencelms
instances:
  cadencelms:
    label: CadenceLMS
    database_url: postgresql://orchestrator:orchestrator@localhost:5432/orchestrator
    roster_file: config/roster.monorepo.yaml
  tendcharting:
    label: TendCharting (EHR)
    database_url: postgresql://orchestrator:orchestrator@localhost:5432/tendcharting
    roster_file: config/roster.tendcharting.yaml
    settings:
      reasoning_model: deepseek-4-flash
      # Engine reasoner = deepseek-4-flash via the DigitalOcean profile (base_url +
      # MODEL_ACCESS_KEY auto-resolved), reached as a DIRECT OpenAI-compatible API
      # (REASONER=openai), NOT the codex CLI — a chat call is ~1s vs the codex CLI's
      # ~5-75s per-call boot tax. Chosen 2026-07-13 after a live A/B on this DO
      # subscription tier: OpenAI models are 403-forbidden here; among the available
      # open models deepseek-4-flash gave valid, concise JSON with the best
      # convention-fidelity. On overload it retries, then falls back to
      # deepseek-v4-pro (see reasoner_path_* in config/settings.yaml).
      engine_reasoner:
        profile: digitalocean
        model: deepseek-4-flash
        fallback_model: deepseek-v4-pro
      # Open-source dev/qa workers run through opencode; codex uses OpenAI native auth.
      orch_manager_codex:
        profile: ''
        model: ''
        reasoning_effort: high
      # Open-source dev/qa workers run through opencode.
      devqa_worker:
        profile: ''
        model: ''
        runtime: opencode
      docs_reasoner_base_url: http://10.100.90.132:8083/v1
      docs_reasoner_model: qwen-local
      promote_repo_path: /home/adam/github/tendcharting-ws/tendcharting
      docs_path: /home/adam/github/tendcharting-ws/tendcharting/docs
      # GAP-4: harness-owned verification — verify_run executes typecheck+tests
      # in these checkouts and records the exit code as machine evidence; the
      # verification gate no longer trusts a worker's self-reported pass.
      verify_worktrees:
        backend: /home/adam/github/tendcharting-ws/wt-backend-qa
        frontend: /home/adam/github/tendcharting-ws/wt-frontend-qa
        senior: /home/adam/github/tendcharting-ws/wt-senior-qa
      verify_cmd: npm run typecheck && npm test
