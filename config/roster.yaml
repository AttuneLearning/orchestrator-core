# =============================================================================
# Roster: the generic role catalog plus the project's active teams.
#
# Roles + sub_roles are copied from the upstream agent-workflow spec
# (github.com/AttuneLearning/agent-workflow @ 555ff00):
#   claude-workflow/teams/catalog.yaml
#
# backend + frontend are configured for the PULL model (live agentic coders):
# dev/qa sub-teams are mode:pull runtime:external (a registered Claude Code /
# Codex worker owns the repo work), plus a lead sub-team (mode:verdict) for the
# reviewer gates. qa + platform stay verdict/api. See config/pipelines.yaml
# (pull-1 / pull-fe) and docs/PULL_AGENTS.md.
# =============================================================================

roles:
  frontend:
    name: Frontend
    sub_roles: [ui-development, design-system, accessibility, performance, state-data-layer]
  backend:
    name: Backend
    sub_roles: [api-development, app-data, auth, integrations, background-jobs]
  mobile:
    name: Mobile
    sub_roles: [ios, android, cross-platform, app-distribution]
  cloud:
    name: Cloud / Infrastructure
    sub_roles: [architecture, cicd, observability, security-compliance, cost-optimization]
  data-warehousing:
    name: Data Warehousing
    sub_roles: [etl-pipelines, analytics-bi, data-governance, ml-ai, streaming]
  qa:
    name: QA
    sub_roles: [manual-qa, test-automation, performance-testing, security-testing]
  platform:
    name: Platform
    sub_roles: [developer-experience, sdk-api-design, internal-tools, documentation]
  orchestration:
    name: Orchestration / Monitor
    sub_roles: [process, architecture, monitoring]

enabled_skills: [comms, adr, memory, context, reflect, refine]

default_runtime: api   # api | cli | external (per-sub_team runtime overrides this)

active_teams:
  - id: backend
    name: Backend
    alias: api
    role: backend
    issue_prefix: API-ISS
    repos: [api-repo]
    sub_teams:
      - id: backend-dev
        name: Backend-Dev
        function: dev
        mode: pull
        runtime: external
        issue_prefix: API-ISS
      - id: backend-qa
        name: Backend-QA
        function: qa
        mode: pull
        runtime: external
        issue_prefix: BQA
      - id: backend-lead
        name: Backend-Lead
        function: lead
        mode: verdict
        runtime: api
        issue_prefix: BLEAD
  - id: qa
    name: QA
    alias: quality
    role: qa
    issue_prefix: QA-ISS
    repos: []          # spans all repos -> receives project-wide rules only
    sub_teams:
      - id: qa-dev
        name: QA-Dev
        function: dev
        issue_prefix: QA-ISS
      - id: qa-qa
        name: QA-QA
        function: qa
        issue_prefix: QA-QA
  - id: platform
    name: Platform
    alias: plat
    role: platform
    issue_prefix: PLAT-ISS
    sub_teams:
      - id: platform-dev
        name: Platform-Dev
        function: dev
        issue_prefix: PLAT-ISS
      - id: platform-qa
        name: Platform-QA
        function: qa
        issue_prefix: PLAT-QA
  - id: frontend
    name: Frontend
    alias: ui
    role: frontend
    issue_prefix: UI-ISS
    repos: [web-repo]
    sub_teams:
      - id: frontend-dev
        name: Frontend-Dev
        function: dev
        mode: pull
        runtime: external
        issue_prefix: UI-ISS
      - id: frontend-qa
        name: Frontend-QA
        function: qa
        mode: pull
        runtime: external
        issue_prefix: UI-QA
      - id: frontend-lead
        name: Frontend-Lead
        function: lead
        mode: verdict
        runtime: api
        issue_prefix: ULEAD
  # Orchestration-monitor: a human-drained inbox for process/architecture
  # questions agents raise (alias 'orch-monitor'/'monitor'). The engine never decomposes
  # its messages into worker issues (loop.MONITOR_TEAMS); they queue pending for
  # the /orch/monitor dashboard, where a human reviews an agent-drafted reply.
  - id: orchestration
    name: Orchestration / Monitor
    alias: orch-monitor
    role: orchestration
    issue_prefix: ORCH-ISS
    repos: []
    sub_teams:
      - id: orchestration-lead
        name: Orchestration-Lead
        function: lead
        mode: verdict
        runtime: api
        issue_prefix: ORCH-ISS

aliases:
  api: backend
  ui: frontend
  quality: qa
  plat: platform
  orch-monitor: orchestration
  monitor: orchestration
