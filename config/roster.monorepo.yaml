# =============================================================================
# Roster — STANDARD MONOREPO EXAMPLE (tracked template; safe to publish).
#
# The reference monorepo topology: one repo with package paths (apps/api,
# apps/web, packages/*), and the standard 7-agent lineup:
#
#   1. orch-manager  (orchestration lead / monitor — coordinates, never a worker)
#   2. backend-dev   3. backend-qa
#   4. frontend-dev  5. frontend-qa
#   6. senior-dev    7. senior-qa   (on-demand escalation team)
#
# `repos:` are PACKAGE PATHS within the monorepo — these strings only scope ADR
# rules (adr_rules._repos_match); pull workers clone the single repo and work in
# a git worktree scoped to their package path. Copy this to
# config/roster.<project>.yaml (gitignored) and edit for a real project.
# =============================================================================

roles:
  backend:
    name: Backend
    sub_roles: [api-development, app-data, auth, integrations, background-jobs]
  frontend:
    name: Frontend
    sub_roles: [ui-development, design-system, accessibility, performance, state-data-layer]
  platform:
    name: Platform
    sub_roles: [developer-experience, sdk-api-design, internal-tools, documentation]
  orchestration:
    name: Orchestration / Monitor
    sub_roles: [process, architecture, monitoring]

enabled_skills: [comms, adr, memory, context, reflect, refine]

default_runtime: api   # api | cli | external (per-sub_team runtime overrides this)

active_teams:
  # --- 2,3: backend (owns apps/api) ----------------------------------------
  - id: backend
    name: Backend
    alias: be
    role: backend
    issue_prefix: API-ISS
    repos: [apps/api]            # monorepo package path
    sub_teams:
      - id: backend-dev
        name: Backend-Dev
        function: dev
        mode: pull
        runtime: external
        issue_prefix: API-ISS
      - id: backend-qa
        name: Backend-QA
        function: qa
        mode: pull
        runtime: external
        issue_prefix: BQA

  # --- 4,5: frontend (owns apps/web) ---------------------------------------
  - id: frontend
    name: Frontend
    alias: fe
    role: frontend
    issue_prefix: UI-ISS
    repos: [apps/web]            # monorepo package path
    sub_teams:
      - id: frontend-dev
        name: Frontend-Dev
        function: dev
        mode: pull
        runtime: external
        issue_prefix: UI-ISS
      - id: frontend-qa
        name: Frontend-QA
        function: qa
        mode: pull
        runtime: external
        issue_prefix: UIQA

  # --- 6,7: senior / escalation (spans all packages; on-demand) ------------
  - id: senior
    name: Senior / Escalation
    alias: sr
    role: platform
    issue_prefix: SR-ISS
    repos: []                    # spans all packages -> project-wide rules only
    sub_teams:
      - id: senior-dev
        name: Senior-Dev
        function: dev
        mode: pull
        runtime: external
        issue_prefix: SR-ISS
      - id: senior-qa
        name: Senior-QA
        function: qa
        mode: pull
        runtime: external
        issue_prefix: SRQA

  # --- 1: orch-manager (orchestration lead / human-drained monitor inbox) ---
  # The coordinator. Renders decisions (mode: verdict); the engine never
  # decomposes its messages. Aliased orch-monitor / monitor.
  - id: orchestration
    name: Orchestration / Monitor
    alias: orch-monitor
    role: orchestration
    issue_prefix: ORCH-ISS
    repos: []
    sub_teams:
      - id: orch-manager
        name: Orch-Manager
        function: lead
        mode: verdict
        runtime: api
        issue_prefix: ORCH-ISS

aliases:
  be: backend
  api: backend
  fe: frontend
  ui: frontend
  sr: senior
  escalation: senior
  orch-monitor: orchestration
  monitor: orchestration
