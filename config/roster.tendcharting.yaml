# =============================================================================
# Roster (MONOREPO variant) — for AttuneLearning/cadencelms (apps/api, apps/web,
# packages/contracts in ONE repo). Identical to the independent-repos roster
# except `repos:` are now PACKAGE PATHS within the monorepo (these strings only
# scope ADR rules — adr_rules._repos_match). Pull workers clone the single
# monorepo and work in a git worktree scoped to their team's package path.
#
# Selected for the tendcharting instance in config/instances.yaml. ROSTER_FILE
# remains available as an explicit environment override.
# =============================================================================

roles:
  frontend:
    name: Frontend
    sub_roles: [ui-development, design-system, accessibility, performance, state-data-layer]
  backend:
    name: Backend
    sub_roles: [api-development, app-data, auth, integrations, background-jobs]
  mobile:
    name: Mobile
    sub_roles: [ios, android, cross-platform, app-distribution]
  cloud:
    name: Cloud / Infrastructure
    sub_roles: [architecture, cicd, observability, security-compliance, cost-optimization]
  data-warehousing:
    name: Data Warehousing
    sub_roles: [etl-pipelines, analytics-bi, data-governance, ml-ai, streaming]
  qa:
    name: QA
    sub_roles: [manual-qa, test-automation, performance-testing, security-testing]
  platform:
    name: Platform
    sub_roles: [developer-experience, sdk-api-design, internal-tools, documentation]
  orchestration:
    name: Orchestration / Monitor
    sub_roles: [process, architecture, monitoring]

enabled_skills: [comms, adr, memory, context, reflect, refine]

default_runtime: api   # api | cli | external (per-sub_team runtime overrides this)

active_teams:
  - id: backend
    name: Backend
    alias: api
    role: backend
    issue_prefix: API-ISS
    repos: [apps/api]            # monorepo package path (was api-repo)
    sub_teams:
      - id: backend-dev
        name: Backend-Dev
        function: dev
        mode: pull
        runtime: external
        issue_prefix: API-ISS
      - id: backend-qa
        name: Backend-QA
        function: qa
        mode: pull
        runtime: external
        issue_prefix: BQA
      - id: backend-lead
        name: Backend-Lead
        function: lead
        mode: verdict
        runtime: api
        issue_prefix: BLEAD
  - id: qa
    name: QA
    alias: quality
    role: qa
    issue_prefix: QA-ISS
    repos: []          # spans all packages -> project-wide rules only
    sub_teams:
      - id: qa-dev
        name: QA-Dev
        function: dev
        issue_prefix: QA-ISS
      - id: qa-qa
        name: QA-QA
        function: qa
        issue_prefix: QA-QA
  - id: platform
    name: Platform
    alias: plat
    role: platform
    issue_prefix: PLAT-ISS
    sub_teams:
      - id: platform-dev
        name: Platform-Dev
        function: dev
        issue_prefix: PLAT-ISS
      - id: platform-qa
        name: Platform-QA
        function: qa
        issue_prefix: PLAT-QA
  - id: frontend
    name: Frontend
    alias: ui
    role: frontend
    issue_prefix: UI-ISS
    repos: [apps/web]            # monorepo package path (was web-repo)
    sub_teams:
      - id: frontend-dev
        name: Frontend-Dev
        function: dev
        mode: pull
        runtime: external
        issue_prefix: UI-ISS
      - id: frontend-qa
        name: Frontend-QA
        function: qa
        mode: pull
        runtime: external
        issue_prefix: UI-QA
      - id: frontend-lead
        name: Frontend-Lead
        function: lead
        mode: verdict
        runtime: api
        issue_prefix: ULEAD
  # Shared API contracts package — owns packages/contracts (the @cadencelms/contracts
  # SSOT). Backend typically owns it; listed so ADR rules can scope to it.
  - id: contracts
    name: Contracts
    alias: contract
    role: platform
    issue_prefix: CON-ISS
    repos: [packages/contracts]
    sub_teams:
      - id: contracts-lead
        name: Contracts-Lead
        function: lead
        mode: verdict
        runtime: api
        issue_prefix: CON-ISS
  # Orchestration-monitor: human-drained inbox for process/architecture questions
  # (alias 'orch-monitor'/'monitor'); engine never decomposes its messages.
  - id: orchestration
    name: Orchestration / Monitor
    alias: orch-monitor
    role: orchestration
    issue_prefix: ORCH-ISS
    repos: []
    sub_teams:
      - id: orchestration-lead
        name: Orchestration-Lead
        function: lead
        mode: verdict
        runtime: api
        issue_prefix: ORCH-ISS
  # Senior / escalation dev (Claude Code). NOT in the normal pull rotation — the
  # engine never auto-assigns it work; issues reach it ONLY via explicit escalation
  # (claim_issue). Cross-cutting: it reads the escalated issue's `team` to decide
  # which package to work (backend -> apps/api, frontend -> apps/web, contracts ->
  # packages/contracts). See ADR-PROC-002.
  - id: senior
    name: Senior / Escalation
    alias: escalation
    role: platform
    issue_prefix: SR-ISS
    repos: []          # spans all packages
    sub_teams:
      - id: senior-dev
        name: Senior-Dev
        function: dev
        mode: pull
        runtime: external
        issue_prefix: SR-ISS
      # Senior-QA: verifies escalated senior-team work so team=senior issues can
      # complete the pipeline (implementation -> verification) instead of stalling
      # at the QA gate for lack of a senior qa worker. Spun up manually (on demand),
      # like senior-dev — not part of the always-on rotation.
      - id: senior-qa
        name: Senior-QA
        function: qa
        mode: pull
        runtime: external
        issue_prefix: SRQA

aliases:
  api: backend
  ui: frontend
  quality: qa
  plat: platform
  contract: contracts
  orch-monitor: orchestration
  monitor: orchestration
  escalation: senior
