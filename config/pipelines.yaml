# =============================================================================
# Pipeline definitions. Each pipeline is an ordered list of gates that an issue
# must pass. Seeded faithfully from the upstream agent-workflow spec
# (github.com/AttuneLearning/agent-workflow @ 555ff00):
#   claude-workflow/teams/protocol.yaml -> issue_lifecycle.phases
#   claude-workflow/scaffolds/dev_communication/PROCESS_GUIDE.md
#
# The orchestrator state machine maps an issue's current gate onto
# in_review[gate_type]; a passing gate_review advances to the next gate, a
# decline increments retry_count. Gates with a `condition` are skipped when the
# condition does not hold for the issue.
# =============================================================================

pipelines:
  pipeline-1:
    name: "Five-Phase Issue Lifecycle"
    description: "Universal lifecycle from PROCESS_GUIDE.md — every issue, every team."
    gates:
      - type: intake
        order: 1
        owner: dev
        description: "Triage inbound work into actionable issues with contracts and context."
        exit_criteria:
          - "Issue file exists in queue/ or active/"
          - "Contracts sent if endpoint work is involved"

      - type: implementation
        order: 2
        owner: dev
        description: "Build the feature or fix, with tests, in a verified state."
        exit_criteria:
          - "Code implemented"
          - "Tests written and passing"
          - "TypeScript compiles with 0 errors"

      - type: qa_gate
        order: 3
        owner: qa
        description: "Validate the implementation against completion criteria."
        exit_criteria:
          - "All completion gate checks pass"
          - "Code review criteria satisfied"
        on_failure: implementation

      - type: completion
        order: 4
        owner: dev
        description: "Record the work and close the issue."
        exit_criteria:
          - "Session file exists"
          - "Issue file in completed/ with commit hash"

      - type: comms_response
        order: 5
        owner: dev
        description: "Send response to originating team — NOT optional when triggered by a message."
        condition: triggered_by_message   # skipped unless the issue has an originating inbound message
        exit_criteria:
          - "Response message exists in originating team's inbox"
          - "Original inbound message archived"

  hotfix:
    name: "Hotfix"
    description: "Minimal path for urgent fixes: implement, validate, ship. No intake/completion ceremony."
    gates:
      - type: implementation
        order: 1
        owner: dev
        description: "Fix with a regression test, in a verified state."
        exit_criteria:
          - "Fix implemented with regression test"
      - type: qa_gate
        order: 2
        owner: qa
        description: "Validate the fix against completion criteria."
        exit_criteria:
          - "All gate checks pass"
        on_failure: implementation

  research:
    name: "Research / Spike"
    description: "Investigation with a written conclusion; no code gates."
    gates:
      - type: intake
        order: 1
        owner: dev
        description: "Frame the question, constraints, and success criteria."
        exit_criteria:
          - "Question and scope written"
      - type: completion
        order: 2
        owner: dev
        description: "Record findings and recommendation."
        exit_criteria:
          - "Findings recorded; session file exists"

  # Pull lifecycle for live agentic coders (Claude Code / Codex / Aider). Pull
  # gates (mode: pull) are claimed by a registered `external` worker of the
  # gate's owner function, which edits/tests in its OWN repo and reports back via
  # MCP; the engine assigns + observes but never runs a worker. Verdict gates
  # (mode: verdict) are rendered by the reasoner / a human / a delegated reviewer.
  # See docs/PULL_AGENTS.md and config/roster.example.pull.yaml.
  pull-1:
    name: "Pull lifecycle (live agentic coders)"
    description: "Pull workers own repos; the lead/reviewer renders verdicts."
    team: backend   # children inherit this; never re-derived from issue text
    gates:
      - type: intake
        order: 1
        owner: lead
        mode: verdict
        description: "Triage inbound work into actionable issues."
      - type: implementation
        order: 2
        owner: dev
        mode: pull
        description: "Dev coder edits code and writes tests (TDD) in its repo."
      - type: verification
        order: 3
        owner: qa
        mode: pull
        on_failure: implementation
        description: "QA runner executes the suite at depth, reports tests_run."
      - type: qa_gate
        order: 4
        owner: lead
        mode: verdict
        description: "Reviewer/lead judges the diff + results: pass or decline."
        on_failure: implementation
      - type: completion
        order: 5
        owner: lead
        mode: verdict
        description: "Record the outcome and close the issue."
      - type: comms_response
        order: 6
        owner: dev
        mode: verdict
        condition: triggered_by_message
        description: "Send response to the originating team (when triggered)."

  # Frontend pull lifecycle: same as pull-1 plus a dedicated E2E gate (Playwright)
  # between unit verification and the reviewer verdict. The e2e gate is pull/owner
  # qa — the QA runner executes `npm run e2e` and reports tests_run; the verdict
  # reviewer then judges code + unit + e2e evidence. Needs the backend serving on
  # :5160 (Playwright auto-starts the frontend dev server). See docs/PULL_AGENTS.md.
  pull-fe:
    name: "Pull lifecycle — frontend (with E2E)"
    description: "Pull workers own the repo; unit + Playwright E2E gates; lead verdict."
    team: frontend   # children inherit this; never re-derived from issue text
    gates:
      - type: intake
        order: 1
        owner: lead
        mode: verdict
        description: "Triage inbound work into actionable issues."
      - type: contract_check
        order: 2
        owner: lead
        mode: verdict
        on_failure: intake
        description: "Contract-first triage: every consumed API endpoint must have
          an agreed/live contract, else request it from backend and block. Mechanical
          + opt-in (contract_gate_enabled); inert for non new-endpoint work."
      - type: implementation
        order: 3
        owner: dev
        mode: pull
        description: "Dev coder edits code and writes tests (TDD) in its repo."
      - type: verification
        order: 4
        owner: qa
        mode: pull
        on_failure: implementation
        description: "QA runner runs unit tests (Vitest), reports tests_run."
      # NOTE: the Playwright e2e gate is deferred — the QA workers don't yet have a
      # served app + browser binaries, so it blocked every frontend issue. Real e2e is
      # handled by the dedicated Phase 4 issue (#55); re-add this gate once that lands.
      - type: qa_gate
        order: 6
        owner: lead
        mode: verdict
        description: "Reviewer/lead judges code + unit tests: pass or decline."
        on_failure: implementation
      - type: completion
        order: 7
        owner: lead
        mode: verdict
        description: "Record the outcome and close the issue."
      - type: comms_response
        order: 8
        owner: dev
        mode: verdict
        condition: triggered_by_message
        description: "Send response to the originating team (when triggered)."
