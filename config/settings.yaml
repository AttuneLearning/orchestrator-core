# Orchestrator global defaults. Project-local overrides live in
# config/instances.yaml under instances.<project>.settings.
# Process environment variables still win at runtime.

reasoning_model: claude-opus-4-8
database_url: postgresql://orchestrator:orchestrator@localhost:5432/orchestrator
anthropic_api_key: ''
# Reasoner backend: "" = auto (anthropic if a key is set, else the hermetic
# stub — zero-config, no infra). Point a real reasoner via a model_profiles
# entry + engine_reasoner.profile per instance, or override globally in
# config/settings.local.yaml (gitignored, operator-local). Never hardcode a
# private endpoint in this tracked file.
reasoner: ''
reasoner_base_url: ''
reasoner_model: ''
reasoner_api_key: ''
reasoner_cli_cmd: cli
# Overload resilience for reasoner=openai: retry primary, fall back to
# reasoner_fallback_model, pause reasoner_path_pause_s, retry the whole path
# reasoner_path_cycles times, then raise ReasonerExhausted (engine off-rails +
# pauses the goal). Empty fallback = primary only.
reasoner_fallback_model: ''
reasoner_retries: 3
reasoner_backoff_base: 1.0
reasoner_backoff_max: 30.0
reasoner_path_pause_s: 60.0
reasoner_path_cycles: 2
reasoner_request_timeout_s: 60.0
docs_reasoner: ''
docs_reasoner_base_url: ''
docs_reasoner_model: ''
docs_reasoner_api_key: ''
code_provider: stub
code_base_url: ''
code_model: ''
code_api_key: ''
thresholds:
  drift_threshold: 0.5
  retry_cap: 3
  step_budget: 25
  # 120s: run-agent-loop.sh heartbeats every 20s for the loop lifetime (2026-07-22,
  # durable-worker plan phase 1) — 6 missed beats before stale, with headroom for
  # two consecutive slow pings (curl -m 8). Never set below ~4 missed beats:
  # stale agents get their issues RECLAIMED, so a too-tight window churns work.
  agent_stale_seconds: 120
  reclaim_cap: 3
  max_depth: 2
  max_subissues: 5
  max_issues_per_goal: 8
  max_children_per_parent: 5
contract_gate_enabled: false
auto_promote_enabled: true
# Product-checkout paths are per-project — set them per instance in
# config/instances.yaml (settings.promote_repo_path / docs_path), or globally in
# config/settings.local.yaml. Never hardcode a real path in this tracked file.
promote_repo_path: ''
promote_branch: main
auto_rebase_downstream: true
docs_path: ''
embed_api_key: ''
default_pipeline: pull-1
docs_reasoner_cli_cmd: ''
embed_provider: stub
embed_base_url: ''
embed_model: ''
apply_enabled: false
apply_repo_path: ''
verify_cmd: ''
database_backup_enabled: true
database_backup_dir: backups/orchestrator-db
model_profiles:
  digitalocean:
    base_url: https://inference.do-ai.run/v1
    model: deepseek-v4-pro
    api_key: ''
    api_key_env: MODEL_ACCESS_KEY
    wire_api: chat
  qwen-local:
    base_url: ''
    model: ''
    api_key: ''
    api_key_env: ''
    wire_api: chat
  openai-custom:
    base_url: ''
    model: ''
    api_key: ''
    api_key_env: ''
    wire_api: chat
# Codex defaults to OpenAI (native auth). Empty profile = no open-source
# provider override injected; open-source models run through opencode instead.
orch_manager_codex:
  profile: ''
  model: ''
  reasoning_effort: high
orch_manager_claude:
  account_label: ''
  model: ''
engine_reasoner:
  profile: ''
  model: ''
# Open-source dev/qa workers run through opencode (menu: glm-5.1, glm-5.2,
# deepseek-v4-pro, qwen-local). Model picked per launch via ORCH_OPENCODE_MODEL.
devqa_worker:
  profile: ''
  model: ''
  runtime: opencode
