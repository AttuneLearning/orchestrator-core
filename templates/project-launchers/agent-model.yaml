# agent-model.yaml — valid (harness x model) combinations.
# The `opencode` and `codex` model lists are auto-generated by
# gather-models.py from each provider's source (opencode: live provider
# /v1/models; codex: its OAuth-refreshed ~/.codex model cache). Edit
# `providers:` or re-run gather to refresh. codex stores bare model ids
# (native auth at runtime); opencode stores `<pid>/<model>` ids.
# claude uses native auth and is hand-maintained.
# List all combos:  agent-launchers/resolve-model.py --list
# -m goes BEFORE the runtime:  ./start-dev-worker.sh backend -m deepseek opencode

providers:
  orch_model:
    harness: opencode
    base_url: https://inference.do-ai.run/v1
    api_key_env: MODEL_ACCESS_KEY
  qwen_local:
    harness: opencode
    base_url: http://10.100.90.132:8083/v1
    api_key_env: QWEN_LOCAL_API_KEY
  openai:
    harness: codex
    source: codex_cache
    cache_file: ~/.codex/models_cache.json
    bare_model: true
harnesses:
  claude:
    provider: anthropic
    default: opus
    models:
      opus:
        model: opus
        full: claude-opus-4-8
        note: Claude Opus 4.8 (default)
      sonnet:
        model: sonnet
        full: claude-sonnet-5
        note: Claude Sonnet 5
      haiku:
        model: haiku
        full: claude-haiku-4-5
        note: Claude Haiku 4.5
  codex:
    provider: openai
    default: gpt-5.6-luna
    models:
      gpt-5.5:
        model: gpt-5.5
        note: GPT-5.5 — Frontier model for complex coding, research, and real-world work.
        provider: openai
      gpt-5.6-luna:
        model: gpt-5.6-luna
        note: GPT-5.6-Luna — Fast and affordable agentic coding model.
        provider: openai
      gpt-5.6-sol:
        model: gpt-5.6-sol
        note: GPT-5.6-Sol — Latest frontier agentic coding model.
        provider: openai
      gpt-5.6-terra:
        model: gpt-5.6-terra
        note: GPT-5.6-Terra — Balanced agentic coding model for everyday work.
        provider: openai
  opencode:
    provider: opensource
    default: deepseek-4-flash
